/* ── HERO ─────────────────────────────────────────── */
.lh {
  min-height: 100svh;
  display: flex;
  align-items: flex-end;
  position: relative;
  overflow: hidden;
  padding: 180px clamp(20px,4vw,60px) clamp(60px,8vw,100px);
}

.lh__bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(155deg, #2d3a2e 0%, #3e4a3a 50%, #5a6b4e 100%);
  transition: background 0s;
}
.lh__bg img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.45; }

.lh__noise {
  position: absolute;
  inset: 0;
  opacity: .04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: cover;
  pointer-events: none;
}

.lh__overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.55) 100%);
}

.lh__watermark {
  position: absolute;
  right: -0.04em;
  bottom: -0.18em;
  font-family: var(--display);
  font-size: clamp(180px,28vw,480px);
  font-weight: 300;
  font-style: italic;
  color: #fff;
  opacity: .05;
  line-height: 1;
  pointer-events: none;
  letter-spacing: -0.04em;
  user-select: none;
}

.lh__inner {
  position: relative;
  z-index: 1;
  max-width: var(--max-w);
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 60px;
  align-items: end;
}
@media (max-width: 900px) { .lh__inner { grid-template-columns: 1fr; } }

.lh__breadcrumb {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin-bottom: 28px;
}
.lh__breadcrumb a { color: inherit; text-decoration: none; }
.lh__breadcrumb a:hover { color: rgba(255,255,255,.85); }

.lh h1 {
  font-family: var(--display);
  font-size: clamp(56px, 9.5vw, 160px);
  font-weight: 300;
  letter-spacing: -0.035em;
  line-height: .88;
  color: #fff;
  margin-bottom: 24px;
}
.lh h1 em { font-style: italic; color: var(--gold); }

.lh__tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 1.8vw, 26px);
  color: rgba(255,255,255,.85);
  line-height: 1.45;
  margin-bottom: 32px;
}

.lh__meta {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.lh__meta-item {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
}
.lh__meta-item b {
  display: block;
  font-family: var(--display);
  font-size: clamp(18px, 1.8vw, 26px);
  font-weight: 300;
  letter-spacing: -0.01em;
  text-transform: none;
  color: #fff;
  opacity: 1;
  margin-top: 4px;
}

/* ── HERO RIGHT ───────────────────────────────────── */
.lh__right {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-bottom: 4px;
}

.lh__desc {
  font-family: var(--serif);
  font-size: clamp(16px, 1.4vw, 19px);
  font-style: italic;
  font-weight: 300;
  line-height: 1.6;
  color: rgba(255,255,255,.82);
  margin-bottom: 32px;
  max-width: 62ch;
}

.lh__desc-accent {
  display: block;
  width: 32px;
  height: 1px;
  background: var(--gold);
  margin-bottom: 20px;
  opacity: .7;
}

.lh__benefits {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid rgba(255,255,255,.1);
}
.lh__benefits li {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.lh__benefits li::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--gold);
  flex-shrink: 0;
  opacity: .6;
}

/* Linea Antietà — verde giada campionato dal packaging (effetto chiaro stile Everby) */
body.theme-line-antieta {
  --cream: #eef7f3;
  --cream-2: #ddefe8;
  --gold: #2e9e82;
  --gold-deep: #247e68;
  --sage-deep: #2e9e82;
  --sage: #7cc3ad;
}

/* ── PRODOTTI ─────────────────────────────────────── */
.lp {
  background: var(--pd-tint, var(--cream));
  padding: clamp(80px,12vw,160px) 0;
}

.lp__head {
  margin-bottom: clamp(50px,6vw,80px);
}
.lp__head h2 {
  font-family: var(--display);
  font-size: clamp(40px,6.5vw,100px);
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: .95;
}
.lp__head h2 em { font-style: italic; color: var(--gold-deep); }

.lp__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(16px,2vw,24px);
}
@media (max-width: 1000px) { .lp__grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .lp__grid { grid-template-columns: 1fr; } }

/* ── PRODUCT CARD ─────────────────────────────────── */
.pc {
  background: #fff;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .35s var(--ease), box-shadow .35s var(--ease);
}
.pc:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(45,58,46,.13);
}

.pc__visual {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
/* SOSTITUIRE: .pc__visual img { width:100%; height:100%; object-fit:cover; } */

.pc__body {
  padding: 20px 24px 22px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  border-top: 1px solid rgba(0,0,0,.07);
}

.pc__cat {
  font-family: var(--sans);
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--sage-deep);
  opacity: .8;
  margin-bottom: 2px;
}

.pc h3 {
  font-family: var(--display);
  font-size: clamp(18px, 1.8vw, 24px);
  font-weight: 300;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.pc__sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  opacity: .65;
  line-height: 1.45;
}

.pc__actives {
  margin-top: 6px;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: .3;
  line-height: 1.6;
}

/* ── SCHEDA TECNICA MODAL ─────────────────────────── */
.st-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,12,10,.75);
  z-index: 1000;
  overflow-y: auto;
  padding: 40px 20px;
}
.st-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.st-modal {
  background: var(--cream);
  max-width: 680px;
  width: 100%;
  position: relative;
}

.st-modal__header {
  padding: 36px 40px 28px;
  border-bottom: 1px solid rgba(0,0,0,.08);
}
.st-modal__brand {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 12px;
}
.st-modal__header h2 {
  font-family: var(--display);
  font-size: clamp(24px,3vw,36px);
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.1;
  margin-bottom: 6px;
}
.st-modal__sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  opacity: .7;
}

.st-modal__body {
  padding: 32px 40px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.st-row label {
  display: block;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: .4;
  margin-bottom: 8px;
}

.st-row p, .st-row span {
  font-family: var(--serif);
  font-size: 16px;
  line-height: 1.65;
  opacity: .85;
}

.st-actives {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.st-active-tag {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 6px 14px;
  border: 1px solid rgba(0,0,0,.15);
  opacity: .7;
}

.st-inci {
  font-family: var(--sans);
  font-size: 11px;
  line-height: 1.7;
  opacity: .5;
  letter-spacing: 0.02em;
}

/* ── INGREDIENTI ACCORDION ────────────────────────────────── */
.st-ing-row {
  border-top: 1px solid rgba(0,0,0,.07);
  cursor: pointer;
}
.st-ing-row:last-child { border-bottom: 1px solid rgba(0,0,0,.07); }

.st-ing-row__head {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  user-select: none;
}
.st-ing-row__n {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.18em;
  opacity: .3;
}
.st-ing-row__name-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.st-ing-row__name {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.st-ing-row__role {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-deep);
  opacity: .7;
}
.st-ing-row__toggle {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  color: var(--ink);
  flex-shrink: 0;
  transition: background .2s, transform .3s var(--ease);
  background: transparent;
}
.st-ing-row.open .st-ing-row__toggle {
  background: var(--ink);
  color: var(--cream);
  transform: rotate(45deg);
}
.st-ing-row--static { cursor: default; }
.st-ing-row--static .st-ing-row__toggle { opacity: .3; cursor: default; }

.st-ing-row__body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .42s cubic-bezier(.22,.61,.36,1);
}
.st-ing-row.open .st-ing-row__body { max-height: 480px; }

.st-ing-detail {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 28px;
  padding: 4px 0 20px 44px;
}
@media (max-width: 600px) { .st-ing-detail { grid-template-columns: 1fr; } }

.st-ing-detail__block label {
  display: block;
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: .4;
  margin-bottom: 6px;
}
.st-ing-detail__block p {
  font-family: var(--serif);
  font-size: 14px;
  line-height: 1.65;
  opacity: .8;
  margin: 0;
}
.st-ing-tags {
  grid-column: 1 / -1;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 4px;
}
.st-ing-tag {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid rgba(0,0,0,.12);
  color: var(--ink);
  opacity: .6;
}

.st-close {

  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border: 1px solid rgba(0,0,0,.15);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--ink);
  transition: background .2s;
}
.st-close:hover { background: var(--cream-2); }

.st-modal__footer {
  padding: 20px 40px;
  border-top: 1px solid rgba(0,0,0,.08);
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.st-pill {
  font-family: var(--sans);

  letter-spacing: 0.16em;

}

/* ── MINI-CARD ──────────────────────────────────────── */
.mini-card {

.mini-card__name {

.mini-card__actives {

.mini-card__cta {

<script>
  /* Adapter master JSON → formato compatibile data.js (PRODUCTS legacy) */
  function adaptJsonProductForLinea(p) {
    const firstSentence = (txt) => {
      if (!txt) return '';
      const m = txt.match(/^.+?[.!?](?:\s|$)/);
      return m ? m[0].trim() : txt;
    };
    return {
      id: p.id,
      line: p.line,
      brand: p.brand,
      code: p.sku,
      size: p.format || p.size || '',
      category: p.subtitle_it || '',
      url: p.url || '',

  function mergeMasterProducts() {
    if (!window.ATH_DATA || !window.ATH_DATA.allProducts) return;
    const master = ATH_DATA.allProducts() || [];
    if (!master.length) return;

    // Linee che hanno prodotti master
    const masterLines = new Set(master.map(p => p.line));

    window.PRODUCTS = window.PRODUCTS || [];
    // Rimuove dai legacy i prodotti delle linee coperte dal master
    window.PRODUCTS = window.PRODUCTS.filter(p => !masterLines.has(p.line));
    // Aggiunge tutti i master
    master.forEach(mp => {

    function buildMiniCards() {
      const l = lang();
      grid.innerHTML = '';
      const cardImgs = CARD_IMGS[lineId] || [];
      products.forEach((p, i) => {
        const shape = shapeFor(p.category);
        const locData = p[l] || p.it;
        const subFull = locData.sub || '';
        const descFull = locData.desc || subFull;
        const activeChips = (locData.actives || []).slice(0, 3)
          .map(a => a.split('—')[0].split('(')[0].trim())
          .filter(Boolean);
        const ctaHref = `../prodotto.html?id=${p.id}`;
        const ctaLabel = l === 'en' ? 'Discover product →' : 'Scopri il prodotto →';
        const heroImg = (p.images && p.images.hero) ? ('../' + p.images.hero) : null;
        const cardImg = heroImg || (cardImgs.length ? cardImgs[i % cardImgs.length] : null);

        const article = document.createElement('article');
        article.className = 'mini-card';
        article.setAttribute('data-sku', p.code || '');
        article.setAttribute('data-reveal', '');
        article.style.setProperty('--d', (i * 40) + 'ms');
        article.setAttribute('data-product-id', p.id);

        article.innerHTML = `
          <div class="mini-card__visual">
            ${cardImg
              ? `<img loading="lazy" decoding="async" src="${cardImg}" alt="${locData.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;">`
              : `<div class="pm">${productMock(line.palette, '', shape)}</div>`
            }
          </div>
          <div class="mini-card__body">
            <div class="mini-card__category">${line.shortName}</div>
            <h3 class="mini-card__name">${toTitleCase(locData.name)}</h3>
            <p class="mini-card__desc">${DESC_SHORT[p.id] || firstSent(descFull)}</p>
            <div class="mini-card__actives">${activeChips.join(' · ')}</div>
            <a class="mini-card__cta" href="${ctaHref}" data-it="Scopri il prodotto &rarr;" data-en="Discover product &rarr;">${ctaLabel}</a>
          </div>`;

        if (heroImg) {
          const imgEl = article.querySelector('.mini-card__visual img');
          if (imgEl) imgEl.onerror = () => {
            const v = imgEl.closest('.mini-card__visual');
            if (v) v.innerHTML = `<div class="pm">${productMock(line.palette, '', shape)}</div>`;
          };
        }
        grid.appendChild(article);
      });
    }

    buildMiniCards();
    initReveal();

    // Aggiorna al cambio lingua
    document.addEventListener('lang-change', () => {
      countEl.textContent = products.length + (lang() === 'it' ? ' prodotti' : ' products');
      buildMiniCards();
      initReveal();
    });
  }

  function findLibKey(activeText) {
    const lower = activeText.toLowerCase();
    for (const [k, v] of Object.entries(ING_KEY_MAP)) {
      if (lower.includes(k)) return v;
    }
    return null;
  }

  function buildActivesAccordion(actives, container) {
    container.innerHTML = '';
    actives.forEach((activeStr, i) => {
      const parts = activeStr.split('—');
      const rawName = parts[0].trim();
      const role = parts[1] ? parts[1].trim() : '';
      const key = findLibKey(rawName);
      const data = key ? ACTIVES_LIB[key] : null;

      const row = document.createElement('div');
      row.className = 'st-ing-row' + (data ? '' : ' st-ing-row--static');

      row.innerHTML = `
        <div class="st-ing-row__head">
          <div class="st-ing-row__n">${String(i + 1).padStart(2, '0')}</div>
          <div class="st-ing-row__name-wrap">
            <div class="st-ing-row__name">${data ? data.name : rawName}</div>
            ${(data ? data.role : role) ? `<div class="st-ing-row__role">${data ? data.role : role}</div>` : ''}
          </div>
          <div class="st-ing-row__toggle">${data ? '+' : '—'}</div>
        </div>
        ${data ? `
        <div class="st-ing-row__body">
          <div class="st-ing-detail">
            <div class="st-ing-detail__block">
              <label>Origine</label>
              <p>${data.origine}</p>
            </div>
            <div class="st-ing-detail__block">
              <label>Meccanismo d'azione</label>
              <p>${data.meccanismo}</p>
            </div>
            <div class="st-ing-detail__block" style="grid-column: 1 / -1;">
              <label>Evidenza clinica</label>
              <p>${data.efficacia}</p>
            </div>
            <div class="st-ing-tags">
              ${data.tags.map(t => `<span class="st-ing-tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>` : ''}
      `;

      if (data) {
        row.querySelector('.st-ing-row__head').addEventListener('click', () => {
          const isOpen = row.classList.contains('open');
          container.querySelectorAll('.st-ing-row.open').forEach(r => r.classList.remove('open'));
          if (!isOpen) row.classList.add('open');
        });
      }

      container.appendChild(row);
    });
  }

  // ── MODAL SCHEDA TECNICA ────────────────────────────
  const overlay = document.getElementById('stOverlay');
  const stClose = document.getElementById('stClose');

  function openSheet(p) {
    const l = typeof ATH !== 'undefined' ? ATH.lang : 'it';
    document.getElementById('stBrand').textContent = 'L\'Erboristica · ' + (line ? line.shortName : '');
    document.getElementById('stTitle').textContent = p[l].name;
    document.getElementById('stSub').textContent = p[l].sub || '';
    document.getElementById('stDesc').textContent = p[l].desc || '';
    document.getElementById('stUse').textContent = p[l].use || '';
    document.getElementById('stInci').textContent = p.inci || '—';

    buildActivesAccordion(p[l].actives || [], document.getElementById('stActives'));

    const footer = document.getElementById('stFooter');
    footer.innerHTML = `
      <span class="st-pill">${p.code || p.id.toUpperCase()}</span>
      <span class="st-pill">${p.size}</span>
      <span class="st-pill">${p.category}</span>
    `;

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  stClose.addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });
