<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Prodotto · Athena's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/tokens.css"/>
  <link rel="stylesheet" href="assets/cert-masks.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--pd-tint, var(--cream)); color: var(--ink); overflow-x: hidden; }

    /* Tema per brand — sovrascrive token cream/accent quando il prodotto appartiene al brand */
    body.theme-everby {
      --cream: #eef6f4;
      --cream-2: #dceee9;
      --gold: #5fb6ab;
      --gold-deep: #5fb6ab;
      --sage-deep: #5fb6ab;
      --sage: #8fc7c0;
    }
    /* Linea Antietà — verde giada campionato dal packaging (effetto chiaro stile Everby) */
    body.theme-line-antieta {
      --cream: #eef7f3;
      --cream-2: #ddefe8;
      --gold: #2e9e82;
      --gold-deep: #247e68;
      --sage-deep: #2e9e82;
      --sage: #7cc3ad;
    }
    .container { max-width: 1320px; margin: 0 auto; padding: 0 clamp(20px, 4vw, 60px); }

    /* ── HERO 2-COL ─────────────────────────────────────────── */
    .pd-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      align-items: stretch;
    }
    @media (max-width: 800px) {
      .pd-hero { grid-template-columns: 1fr; }
    }

    /* Il pannello foto prende la forma 3:4 della foto: la foto ci sta TUTTA,
       nessun taglio, nessuno sfondo, niente sfocato. Il banner adatta la sua altezza alla foto. */
    .pd-hero__visual {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pd-hero__bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #2d3a2e 0%, #050505 100%);
      transition: background .6s;
    }
    .pd-hero__photo-ph {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(201,169,110,.15);
      z-index: 1;
    }
    .pd-hero__photo-ph span {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(201,169,110,.35);
      text-align: center;
      padding: 0 20px;
    }
    .pd-hero__watermark {
      position: absolute;
      bottom: -0.1em;
      right: -0.02em;
      font-family: var(--display);
      font-size: clamp(80px, 14vw, 200px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
      opacity: .03;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      z-index: 1;
    }
    .pd-hero__mock {
      position: relative;
      z-index: 2;
      animation: mock-float 6s ease-in-out infinite;
    }
    .pd-hero__mock svg {
      width: min(200px, 38vw);
      filter: drop-shadow(0 30px 60px rgba(0,0,0,.5));
    }
    @keyframes mock-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-16px); }
    }
    .pd-hero__glow {
      position: absolute;
      width: 50vmin;
      height: 50vmin;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow-c, rgba(201,169,110,.18)) 0%, transparent 70%);
      pointer-events: none;
      animation: glow-pulse 6s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: .7; }
      50%       { transform: scale(1.15); opacity: 1; }
    }

    .pd-hero__info {
      background: var(--pd-tint, var(--cream));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      text-align: right;
      padding: clamp(100px,10vw,140px) clamp(32px,5vw,72px) clamp(60px,6vw,80px);
    }
    .pd-hero__brand-tag {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .75;
      margin-bottom: 32px;
    }
    .pd-hero__line-tag {
      display: none;
    }
    .pd-hero__name {
      font-family: var(--display);
      font-size: clamp(36px, 5.5vw, 72px);
      font-weight: 300;
      letter-spacing: -0.025em;
      line-height: 1.0;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .pd-hero__cat {
      display: none;
    }
    .pd-hero__sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(17px, 1.4vw, 19px);
      color: rgba(26,26,26,.6);
      margin-bottom: 32px;
      margin-top: 4px;
      line-height: 1.55;
      max-width: 52ch;
    }
    .pd-hero__desc {
      font-family: var(--serif);
      font-size: clamp(17px, 1.4vw, 19px);
      line-height: 1.78;
      color: rgba(26,26,26,.62);
      margin-bottom: 40px;
    }
    .pd-hero__desc strong {
      color: rgba(26,26,26,.88);
      font-weight: 400;
    }
    .pd-hero__specs {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      padding-top: 22px;
      border-top: 1px solid rgba(0,0,0,.09);
    }
    .pd-spec__label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,26,26,.4);
      margin-bottom: 6px;
    }
    .pd-spec__val {
      font-family: var(--serif);
      font-size: 17px;
      color: rgba(26,26,26,.78);
    }

    /* CTA Acquista (hero) — sobria, no bottone colorato */
    .pd-hero__cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-top: 36px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--ink);
      text-decoration: none;
      padding: 0 0 8px;
      border-bottom: 1px solid rgba(26,26,26,.25);
      transition: all .35s cubic-bezier(.22,.61,.36,1);
      position: relative;
      align-self: flex-start;
    }
    .pd-hero__cta::before {
      content: '';
      position: absolute;
      left: 0; bottom: -1px;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width .55s cubic-bezier(.22,.61,.36,1);
    }
    .pd-hero__cta:hover { color: var(--gold-deep); }
    .pd-hero__cta:hover::before { width: 100%; }
    .pd-hero__cta-arrow {
      display: inline-block;
      transition: transform .35s cubic-bezier(.22,.61,.36,1);
    }
    .pd-hero__cta:hover .pd-hero__cta-arrow { transform: translateX(6px); }

    /* ── CERT BADGES ────────────────────────────────────────── */
    .pd-certs {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(18px, 2.2vw, 32px);
      align-items: center;
      margin-bottom: 24px;
    }
    .pd-cert-logo {
      width: clamp(56px, 6vw, 76px);
      aspect-ratio: 1;
      background-color: var(--pd-accent, var(--gold-deep));
      -webkit-mask: var(--logo) center / contain no-repeat;
              mask: var(--logo) center / contain no-repeat;
      opacity: .85;
      transform: scale(var(--logo-scale, 1));
      transition: opacity .35s var(--ease), transform .35s var(--ease);
    }
    .pd-cert-logo:hover { opacity: 1; transform: scale(var(--logo-scale, 1)) translateY(-3px); }
    .pd-cert-opht {
      display: inline-flex;
      align-items: center;
      padding: 5px 13px;
      border: 1px solid var(--pd-accent, var(--gold-deep));
      color: var(--pd-accent, var(--gold-deep));
      font: 600 9px/1 var(--sans, 'Inter');
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 2px;
      opacity: .8;
      align-self: center;
    }

    /* ── ZIG-ZAG ROWS (foto + testo alternati) ─────────────────── */
    .pd-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: clamp(480px, 80vh, 760px);
      background: var(--pd-tint, var(--cream));
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .pd-row__fig {
      position: relative;
      min-height: clamp(380px, 60vh, 600px);
      background: rgba(45,58,46,.04);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pd-row__fig .pd-photo-ph {
      width: 100%; height: 100%;
      aspect-ratio: auto;
      border: 1px dashed rgba(45,58,46,.12);
      display: flex; align-items: center; justify-content: center;
    }
    .pd-row__txt {
      padding: clamp(60px, 8vh, 110px) clamp(28px, 5vw, 80px);
      display: flex; flex-direction: column; justify-content: center;
    }
    .pd-row__h {
      font-family: var(--display);
      font-weight: 200;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.1;
      letter-spacing: -.01em;
      margin-bottom: 36px;
      color: var(--ink);
    }
    .pd-row__h em {
      font-style: italic;
      color: var(--gold-deep);
      font-weight: 200;
    }
    @media (max-width: 800px) {
      .pd-row { grid-template-columns: 1fr; }
      .pd-row--photo-right .pd-row__fig { order: 1; }
      .pd-row--photo-right .pd-row__txt { order: 2; }
      .pd-row__fig { min-height: 55vh; }
    }

    /* PHOTO STRIP legacy (non più usato ma mantenuto se serve) */
    .pd-photos {
      background: #fff;
      padding: clamp(40px, 5vw, 64px) 0;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .pd-photos__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 800px) { .pd-photos__grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .pd-photos__grid { grid-template-columns: 1fr; } }
    .pd-photo-ph {
      aspect-ratio: 4/5;
      background: rgba(45,58,46,.04);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(45,58,46,.12);
    }
    .pd-photo-ph span {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(45,58,46,.3);
      text-align: center;
      padding: 0 12px;
    }

    /* ── BENEFICI CHIAVE (light, sezione combinata) ─────────────── */
    .pd-benefits-light {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: rgba(0,0,0,.06);
      margin-bottom: clamp(48px, 6vw, 72px);
    }
    /* ── INGREDIENTI CHIAVE ─────────────────────────────────── */
    .pd-ingredients {
      background: var(--cream-2);
      padding: clamp(70px, 9vw, 110px) 0;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .pd-ingredients__heading {
      font-family: var(--display);
      font-size: clamp(28px, 4.5vw, 56px);
      font-weight: 300;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: clamp(36px, 5vw, 56px);
    }
    .pd-ingredients__heading em { font-style: italic; color: var(--gold-deep); }
    .pd-ingredients__count {
      font-family: var(--serif);
      font-style: italic;
      font-size: 13px;
      color: rgba(26,26,26,.35);
      margin-left: 16px;
    }

    /* ingredient row */
    .ki-row {
      border-top: 1px solid rgba(0,0,0,.08);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .ki-row:last-child { border-bottom: 1px solid rgba(0,0,0,.08); }
    .ki-row__head {
      display: grid;
      grid-template-columns: clamp(40px, 5vw, 60px) 1fr auto;
      align-items: center;
      gap: clamp(16px, 3vw, 36px);
      padding: clamp(20px, 2.5vw, 28px) 0;
      position: relative;
    }
    .ki-row__head::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(201,169,110,.05);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s var(--ease);
    }
    .ki-row:hover .ki-row__head::before { transform: scaleX(1); }
    .ki-row__num {
      font-family: var(--display);
      font-style: italic;
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 300;
      color: var(--gold);
      opacity: .22;
      line-height: 1;
      transition: opacity .3s;
    }
    .ki-row:hover .ki-row__num,
    .ki-row.open .ki-row__num { opacity: .55; }
    .ki-row__main { min-width: 0; }
    .ki-row__name {
      font-family: var(--display);
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .ki-row__tag {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-deep);
      opacity: .5;
    }
    .ki-row__toggle {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: rgba(26,26,26,.4);
      flex-shrink: 0;
      transition: background .25s, color .25s, transform .35s var(--ease), border-color .25s;
      position: relative;
      z-index: 1;
    }
    .ki-row.open .ki-row__toggle {
      background: var(--gold);
      color: var(--ink);
      border-color: var(--gold);
      transform: rotate(45deg);
    }
    .ki-row--no-data { cursor: default; }
    .ki-row--no-data .ki-row__toggle { opacity: .25; cursor: default; }

    /* body inline NON usato — apre modale */
    .ki-row__body { display: none; }

    /* MODALE INGREDIENTE */
    .ki-modal {
      position: fixed; inset: 0;
      background: rgba(8,8,10,.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      display: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: clamp(40px, 6vh, 80px) clamp(16px, 4vw, 40px);
      opacity: 0;
      transition: opacity .35s var(--ease);
    }
    .ki-modal.show { display: block; opacity: 1; }
    .ki-modal__box {
      background: var(--topbar-bg, var(--cream));
      border-radius: 6px;
      max-width: 920px; width: 100%;
      margin: 0 auto;
      position: relative;
      padding: clamp(40px, 5vw, 80px) clamp(28px, 5vw, 80px);
      transform: translateY(20px);
      transition: transform .5s var(--ease);
      box-shadow: 0 60px 120px rgba(0,0,0,.5);
    }
    .ki-modal.show .ki-modal__box { transform: none; }
    .ki-modal__close {
      position: absolute;
      top: 18px; right: 22px;
      background: transparent; border: 0;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: rgba(26,26,26,.5);
      font-size: 28px; line-height: 1;
      transition: color .25s;
      z-index: 2;
    }
    .ki-modal__close:hover { color: var(--ink); }
    .ki-modal__num {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-bottom: 18px;
    }
    .ki-modal__name {
      font-family: var(--display);
      font-weight: 200;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: -.01em;
    }
    .ki-modal__role {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(17px, 1.5vw, 21px);
      color: rgba(26,26,26,.6);
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(26,26,26,.1);
      border-bottom: 1px solid color-mix(in srgb, var(--gold-deep) 32%, transparent);
    }
    .ki-modal__block { margin-bottom: 28px; }
    .ki-modal__block:last-of-type { margin-bottom: 0; }
    .ki-modal__label {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-bottom: 10px;
    }
    .ki-modal__text {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(15px, 1.3vw, 18px);
      line-height: 1.7;
      color: rgba(26,26,26,.85);
    }
    .ki-modal__tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 28px; padding-top: 24px;
      border-top: 1px solid rgba(26,26,26,.1);
      border-top: 1px solid color-mix(in srgb, var(--gold-deep) 32%, transparent);
    }
    .ki-modal__tag {
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(26,26,26,.65);
      padding: 6px 12px;
      border: 1px solid rgba(26,26,26,.18);
      border-radius: 100px;
    }
    body.ki-modal-open {
      overflow: hidden;
    }

    .ki-detail {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: rgba(0,0,0,.06);
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    @media (max-width: 900px) { .ki-detail { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .ki-detail { grid-template-columns: 1fr; } }
    .ki-detail__block {
      background: var(--cream-2);
      padding: clamp(22px, 2.5vw, 36px);
    }
    .ki-detail__block--wide { grid-column: 1 / -1; }
    .ki-detail__label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-deep);
      opacity: .7;
      margin-bottom: 12px;
      display: block;
    }
    .ki-detail__text {
      font-family: var(--serif);
      font-size: clamp(15px, 1.35vw, 17px);
      line-height: 1.7;
      color: rgba(26,26,26,.72);
    }
    .ki-detail__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .ki-detail__tag {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: 1px solid rgba(201,169,110,.35);
      color: var(--gold-deep);
      background: rgba(201,169,110,.07);
      transition: background .25s, border-color .25s;
    }
    .ki-detail__tag:hover {
      background: rgba(201,169,110,.14);
      border-color: rgba(201,169,110,.6);
    }

    /* ── USO ────────────────────────────────────────────────── */
    .pd-uso {
      background: #fff;
      padding: clamp(70px, 9vw, 110px) 0;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .pd-uso__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(36px, 5vw, 72px);
    }
    @media (max-width: 700px) { .pd-uso__grid { grid-template-columns: 1fr; } }
    .pd-block__label {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold-deep);
      opacity: .65;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .pd-uso__steps {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .pd-uso__step {
      display: flex;
      gap: 16px;
    }
    .pd-uso__step-n {
      font-family: var(--display);
      font-style: italic;
      font-size: 22px;
      color: var(--gold);
      opacity: .35;
      flex-shrink: 0;
      width: 28px;
    }
    .pd-uso__step-text {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.65;
      color: rgba(26,26,26,.7);
    }
    .pd-uso__text {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.75;
      color: rgba(26,26,26,.65);
    }

    /* ── FORMULA + INCI ─────────────────────────────────────── */
    .pd-formula-section {
      background: var(--cream-2);
      padding: clamp(70px, 9vw, 110px) 0;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .pd-formula-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(36px, 5vw, 72px);
    }
    @media (max-width: 700px) { .pd-formula-grid { grid-template-columns: 1fr; } }
    .pd-formula__pills {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .pd-formula__pill {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;

<script>
initAthenas('prodotto');
const _topbar = document.querySelector('.topbar');
if (_topbar) { _topbar.classList.add('solid'); }
window.addEventListener('scroll', () => { if (_topbar) _topbar.classList.add('solid'); }, { passive: true });

const params    = new URLSearchParams(location.search);
const productId = params.get('id');

if (!productId) {
  document.body.innerHTML = '<div style="padding:120px 40px;text-align:center;font-family:sans-serif;opacity:.5">Prodotto non trovato.</div>';
  throw new Error('no product id');
}

function adaptJsonProduct(p) {
  if (!p) return null;
  return {
    id: p.id,
    line: p.line,
    brand: p.brand,
    code: p.sku,
    size: p.format || p.size || '',
    category: p.subtitle_it ? '' : '',
    inci: p.inci,
    natural_pct: p.natural_pct,
    certifications: p.certifications || [],
    images: p.images,
    it: {
      name: p.name_it || '',
      sub: p.subtitle_it || '',
      desc: p.description_it || '',
      use: p.usage_it || '',
      actives: p.actives_main || []
    },
    en: {
      name: p.name_en || p.name_it || '',
      sub: p.subtitle_en || p.subtitle_it || '',
      desc: p.description_en || p.description_it || '',
      use: p.usage_en || p.usage_it || '',
      actives: p.actives_main || []
    }
  };
}

function bootProduct(prod) {
  window.product = prod;
  initProductPage(prod);
}

let product = (window.PRODUCTS || []).find(p => p.id === productId);

if (!product) {
  ATH_DATA.ready(() => {
    const p = ATH_DATA.product(productId);
    if (!p) {
      document.body.innerHTML = '<div style="padding:120px 40px;text-align:center;font-family:sans-serif;opacity:.5">Prodotto non trovato.</div>';
      return;
    }
    bootProduct(adaptJsonProduct(p));
  });
} else {
  bootProduct(product);
}

function initProductPage(product) {

let lang = document.documentElement.lang === 'en' ? 'en' : 'it';
let loc  = product[lang] || product.it;

// Palette per linea — grad: sfondo hero dietro foto (dal catalogo) · tint: sfondo chiaro pannelli/sezioni · glow: alone · accent: colore-linea
const palettes = {
  antieta:    { grad: '135deg, #f1faf6 0%, #d9efe7 55%, #8fd0bd 100%', tint: '#e9f5f0', glow: 'rgba(70,185,150,.18)', accent: '#2e9e82' },
  argan:      { grad: '135deg, #f7ead0 0%, #f0d898 60%, #e8c878 100%', tint: '#f2e2ab', glow: 'rgba(210,150,70,.20)', accent: '#a8842c' },
  cocco:      { grad: '135deg, #eef5f7 0%, #cce4ec 60%, #a8d0dc 100%', tint: '#cfe6ee', glow: 'rgba(100,180,220,.18)', accent: '#3a8aa0' },
  mandorle:   { grad: '135deg, #f7edea 0%, #eed8d0 60%, #e0c4b8 100%', tint: '#f0d8cd', glow: 'rgba(220,150,170,.18)', accent: '#b87860' },
  illumia:    { grad: '135deg, #f7edd0 0%, #edda98 60%, #e0c870 100%', tint: '#f0e1a4', glow: 'rgba(220,180,60,.20)', accent: '#b8902c' },
  purysens:   { grad: '135deg, #dde8f2 0%, #c0d4e8 60%, #a0c0dc 100%', tint: '#cdddee', glow: 'rgba(130,160,220,.18)', accent: '#5a7a9a' },
  nutra:      { grad: '135deg, #f5ede5 0%, #e8ceac 60%, #d8ae88 100%', tint: '#ecd6bf', glow: 'rgba(200,120,60,.18)', accent: '#a8703c' },
  estratti:   { grad: '135deg, #edf2e8 0%, #ccddb8 60%, #aac898 100%', tint: '#d6e6c8', glow: 'rgba(90,160,90,.18)', accent: '#5a7a4a' },
  uomo:       { grad: '135deg, #070c18 0%, #0e1c30 60%, #162440 100%', tint: '#d4dce6', glow: 'rgba(100,120,180,.18)', accent: '#5a6e9a' },
  innovation: { grad: '135deg, #0c0818 0%, #1a1030 60%, #261640 100%', tint: '#ddd0ee', glow: 'rgba(160,100,220,.20)', accent: '#8a5ac0' },
  pearls:     { grad: '135deg, #f2eef6 0%, #ddd0e8 60%, #c0a8d8 100%', tint: '#e2d2ee', glow: 'rgba(160,100,220,.18)', accent: '#8a5ac0' },
  'mineral-infusions': { grad: '135deg, #e4f2f4 0%, #b8e0e4 60%, #88ccd4 100%', tint: '#cce8ec', glow: 'rgba(80,160,200,.18)', accent: '#3a9aa6' },
  'doppia-detersione': { grad: '135deg, #ece8f4 0%, #d4c8e8 60%, #b4a0d8 100%', tint: '#dacfec', glow: 'rgba(150,120,200,.16)', accent: '#7a60a8' },
  kaley:      { grad: '135deg, #1e0610 0%, #380c20 60%, #521230 100%', tint: '#f0d6e0', glow: 'rgba(200,96,144,.20)', accent: '#c86090' },
  everby:     { grad: '135deg, #f0faf7 0%, #d4ede9 55%, #74d0c4 100%', tint: '#eef9f5', glow: 'rgba(116,208,196,.20)', accent: '#2e8a82' },
  sphea:      { grad: '135deg, #040810 0%, #080e22 60%, #0c1432 100%', tint: '#d4dce6', glow: 'rgba(138,154,192,.16)', accent: '#5a6e9a' },
};

// Override palette per singolo prodotto: alcuni prodotti condividono la stessa linea
// (es. line 'innovation' = Pearls + Mineral Infusions + Doppia Detersione) ma hanno
// identita cromatiche diverse campionate dal loro packaging. Vince sulla palette di linea.
const productPalettes = {
  'inn-pearls-niac': { grad: '135deg, #fdf6f9 0%, #f3d9e2 55%, #e7b6c8 100%', tint: '#f3d9e2', glow: 'rgba(200,110,150,.18)', accent: '#bd6688' },
  'inn-pearls-c':    { grad: '135deg, #fdfbf2 0%, #f3ecc6 55%, #ecdc94 100%', tint: '#f1e7c2', glow: 'rgba(210,180,70,.20)',  accent: '#b08f2a' },
  'inn-pearls-q10':  { grad: '135deg, #f6f9fc 0%, #dce8f1 55%, #b8d0e2 100%', tint: '#dce8f1', glow: 'rgba(90,140,190,.18)',  accent: '#487a9c' },
  'inn-min-1':       { grad: '135deg, #e4f2f4 0%, #b8e0e4 60%, #88ccd4 100%', tint: '#cce8ec', glow: 'rgba(80,160,200,.18)',  accent: '#3a9aa6' },
  'inn-min-2':       { grad: '135deg, #e4f2f4 0%, #b8e0e4 60%, #88ccd4 100%', tint: '#cce8ec', glow: 'rgba(80,160,200,.18)',  accent: '#3a9aa6' },
  'inn-kit':         { grad: '135deg, #ece8f4 0%, #d4c8e8 60%, #b4a0d8 100%', tint: '#dacfec', glow: 'rgba(150,120,200,.16)', accent: '#7a60a8' },
};

const lineId = product.line || product.brand || '';
const pal    = productPalettes[product.id] || palettes[lineId] || { grad: '145deg, #1a1a1a 0%, #050505 100%', tint: '#f3eee4', glow: 'rgba(201,169,110,.15)', accent: '#9a7f4a' };

// Tint per-prodotto: filo di colore chiarissimo campionato dallo sfondo del packaging.
// Sovrascrive solo lo sfondo chiaro della pagina (--pd-tint), lascia intatti gli accenti oro della linea.
const productTints = {
  'estratti-bagno-doccia-tè-verde': '#d5ebdd',
  'estratti-burro-di-karité-vitamina-e': '#f6eadc',

const darkenHex = (hex, f) => {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * (1 - f));
  const g = Math.round(((n >> 8) & 255) * (1 - f));
  const b = Math.round((n & 255) * (1 - f));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
};

// Foto reali: inietta hero + dettagli quando presenti, fallback al placeholder/mock se mancano o non caricano
(function injectPhotos() {
  const imgs = product.images || {};
  function place(container, src, alt, hideSel, fit, objpos, matchAspect) {
    if (!container || !src) return;
    const img = new Image();
    img.loading = 'lazy';
    img.decoding = 'async';
    img.alt = alt || '';
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:' + (fit || 'cover') + ';object-position:' + (objpos || 'center') + ';z-index:2;opacity:0;transition:opacity .5s';
    img.onload = () => {
      img.style.opacity = '1';
      // Il banner prende l'aspect-ratio REALE della foto -> la foto si vede tutta, zero tagli, per qualsiasi formato
      if (matchAspect && img.naturalWidth) container.style.aspectRatio = img.naturalWidth + ' / ' + img.naturalHeight;
      hideSel.forEach(s => { const el = container.querySelector(s); if (el) el.style.display = 'none'; });
    };
    img.onerror = () => img.remove();
    img.src = src + (src.includes('?') ? '&' : '?') + 'v=2';
    container.appendChild(img);
  }
  // Hero: tutte le foto sorgente sono normalizzate a 3:4 (sfondo esteso ai bordi),
  // quindi cover taglia in modo uniforme e lieve come nel riferimento approvato
  // (uomo shampoo-active). Default 'center 18%' (alto), override per-linea e per-prodotto.
  const HERO_OBJ_POS_LINE = { nutra: 'center 50%', purysens: 'center 50%' };  // cocco rimosso: usa il default 'center 18%' come Argan (stesse identiche impostazioni)
  const HERO_OBJ_POS = { 'inn-kit': 'center 38%' };
  const heroPos = HERO_OBJ_POS[product.id] || HERO_OBJ_POS_LINE[lineId] || 'center 18%';
  place(document.querySelector('.pd-hero__visual'), imgs.hero, loc.name, ['.pd-hero__photo-ph', '#pdMock'], 'cover', heroPos, true);
  place(document.getElementById('pdFig1'), imgs.detail_1, loc.name, ['.pd-photo-ph']);
  place(document.getElementById('pdFig2'), imgs.detail_2, loc.name, ['.pd-photo-ph']);
})();

  'jojoba': { name: 'Olio di Jojoba (Simmondsia chinensis)', role: 'Bilanciante del sebo · Emolliente', origine: 'Cera liquida da semi di Simmondsia chinensis. 97% esteri cerosi a catena lunga, struttura unica nel regno vegetale.', meccanismo: 'Struttura identica al sebo cutaneo → bilanciamento non comedogenico. Stabilissima all\'ossidazione. Bassa viscosità senza effetto grasso.', efficacia: 'Non comedogenica (0/5 in vitro). Sebo -12% in 4 settimane. Ottima tollerabilità con acne (n=40).', tags: ['Bilanciante','Emolliente','Non comedogenico','Sebo'] },
  'allantoina': { name: 'Allantoina', role: 'Lenitiva · Cheratoplastica', origine: 'Da Symphytum officinale o per sintesi (ossidazione acido urico). GRAS FDA.', meccanismo: 'Cheratoplastica (basse conc.) / cheratolitica (alte conc.). Antagonizza prostaglandine pro-infiammatorie. Forma complessi con proteine irritanti neutralizzandole.', efficacia: 'Guarigione cutanea +39% vs controllo (allantoina 2%). Irritazione da SDS -26% (0,5%).', tags: ['Lenitiva','Cicatrizzante','Rinnovante','Tollerabilità'] },
  'bamboo': { name: 'Estratto di Bambù (Bambusa vulgaris)', role: 'Rinforzante · Minerale', origine: 'Dall\'internodo del bambù. Ricco in silice vegetale (70% del contenuto secco), flavonoidi e aminoacidi.', meccanismo: 'Silice organica biodisponibile → cofattore della prolil-idrossilasi → sintesi idrossiprolina nel collagene. Stimola proliferazione fibroblasti.', efficacia: 'Collagene +18% in coltura di fibroblasti (0,5%). Rughe -12% in 6 settimane su pelle maschile (n=28).', tags: ['Rinforzante','Silicio','Collagene','Anti-età'] },
  'tea-tree': { name: 'Tea Tree Oil (Melaleuca alternifolia)', role: 'Antibatterico · Purificante', origine: 'Olio essenziale da foglie di Melaleuca alternifolia. Standardizzato in terpinen-4-olo (>30%) secondo ISO 4730.', meccanismo: 'Terpinen-4-olo altera permeabilità di membrana batterica. Attività contro C. acnes, S. aureus MRSA, Candida. Inibisce mediatori infiammatori da monociti.', efficacia: 'TTO 5% = benzoyl peroxide 5% su acne (RCT n=124, 3 mesi) con meno irritazione. Lesioni acneiche -44%.', tags: ['Antibatterico','Antifungino','Purificante','Anti-acne'] },
  'camomilla': { name: 'Estratto di Camomilla (Matricaria chamomilla)', role: 'Lenitivo · Anti-eritema', origine: 'Da capolini di Matricaria chamomilla. Standardizzato in apigenina e α-bisabololo.', meccanismo: 'Apigenina inibisce COX-2 e LOX-5 → riduzione PGE2 e leucotrieni. Α-bisabololo anti-infiammatorio. Camazulene antiossidante e anti-istaminico.', efficacia: 'Eritema e prurito -60% vs placebo in dermatite allergica (2%, n=20). Paragonabile a idrocortisone 0,25% su eczema cronico lieve.', tags: ['Lenitiva','Anti-eritema','Anti-prurito','Flavonoidi'] },
  'rosa': { name: 'Estratto di Rosa (Rosa damascena)', role: 'Antiossidante · Idratante', origine: 'Da petali di Rosa damascena (Bulgaria, Marocco). Olio essenziale (citronellolo, geraniolo) e polifenoli (quercetina, antocianine).', meccanismo: 'Olio essenziale inibisce elastasi neutrofila. Polifenoli antiossidanti (ORAC ~22.000 µmol TE/g). Galloyl glucosidi inibitori MMP-1/2.', efficacia: 'TEWL -11%, idratazione +25% in 4 settimane (2%). Attività antiossidante 10× superiore alla vitamina E (DPPH).', tags: ['Antiossidante','Idratante','Sensoriale','Anti-età'] },
  'ginkgo-biloba': { name: 'Estratto di Ginkgo Biloba', role: 'Antiossidante · Microcircolatorio', origine: 'Foglie di Ginkgo biloba (fossile vivente). Standardizzato in flavonoidi (quercetina, kaempferolo) e terpenolattoni (bilobalide, ginkgolidi A/B).', meccanismo: 'Scavenger di radicali liberi (ROS). Migliora la microcircolazione cutanea inibendo PAF (platelet-activating factor). Aumenta l\'ossigenazione tissutale e protegge l\'endotelio capillare.', efficacia: 'Riduzione del 35% dei segni di stanchezza cutanea in 4 settimane (1%). Aumento microcircolazione del 18% (laser-Doppler).', tags: ['Antiossidante','Tonificante','Microcircolazione','Energizzante'] },
  'ginseng': { name: 'Estratto di Ginseng (Panax ginseng)', role: 'Tonico · Rivitalizzante', origine: 'Radice di Panax ginseng coreano. Saponine triterpeniche (ginsenosidi Rb1, Rg1, Re) ad azione adattogena.', meccanismo: 'Rg1 stimola la proliferazione dei fibroblasti e la sintesi di procollagene I. Rb1 protegge dall\'apoptosi UV-indotta. Effetto adattogeno: migliora la risposta cutanea allo stress.', efficacia: 'Elasticità cutanea +18% in 12 settimane (3%, n=23). Riduzione del 22% dei segni di affaticamento cutaneo.', tags: ['Tonico','Rivitalizzante','Anti-età','Adattogeno'] },
  'bergamotto': { name: 'Olio Essenziale di Bergamotto (Citrus bergamia)', role: 'Tonico · Rinfrescante', origine: 'Spremitura a freddo della scorza del frutto di Citrus bergamia (Calabria DOP). Limonene (37%), linalile acetato (30%), linalolo (10%).', meccanismo: 'Aroma agrumato fresco con effetto tonico psicofisico. Antimicrobico ad ampio spettro (S. aureus, E. coli). Bergamottina e bergaptene: usati in formula bergapten-free per evitare fototossicità.', efficacia: 'Attività antibatterica MIC 0,25% su S. aureus. Effetto rinfrescante percepito a 30 sec dall\'applicazione.', tags: ['Tonico','Agrumato','Antimicrobico','Rinfrescante'] },
  'pepe-rosa': { name: 'Pepe Rosa (Schinus molle)', role: 'Stimolante · Tonico', origine: 'Bacche essiccate di Schinus molle (falso pepe). Olio essenziale ricco di α-pinene, β-pinene, limonene e sesquiterpeni.', meccanismo: 'Nota piccante-floreale che apre la composizione olfattiva. Tonificante locale, leggero effetto vasoattivo. Antiossidante grazie ai polifenoli.', efficacia: 'Capacità antiossidante DPPH IC50 = 35 µg/mL. Tonicità cutanea percepita +15% (panel sensoriale).', tags: ['Tonico','Speziato','Antiossidante','Vivace'] },
  'cedro': { name: 'Legno di Cedro (Cedrus atlantica)', role: 'Riequilibrante · Lenitivo', origine: 'Distillazione del legno di Cedrus atlantica (Atlante marocchino). Sesquiterpeni (cedrolo, atlantolo, cedreni) con note balsamiche calde.', meccanismo: 'Cedrolo: leggera azione sedativa via GABA e tonificante della microcircolazione capillare. Antibatterico contro S. aureus e P. acnes.', efficacia: 'Effetto rilassante percepito (HRV +8%) entro 5 minuti. Attività antibatterica MIC 0,5%.', tags: ['Riequilibrante','Legnoso','Calmante','Antibatterico'] },
  'patchouli': { name: 'Patchouli (Pogostemon cablin)', role: 'Rigenerante · Sensoriale', origine: 'Distillazione delle foglie essiccate e fermentate di Pogostemon cablin (Indonesia). Patchoulolo (35-40%), α-bulnesene, α-guaiene.', meccanismo: 'Patchoulolo stimola il turnover cellulare e ha attività anti-elastasi. Riconosciuta azione rigenerante e cicatrizzante. Fissativo olfattivo nelle composizioni.', efficacia: 'Inibizione elastasi -42% (in vitro, 0,5%). Effetto sulla coesione cellulare epidermica +12%.', tags: ['Rigenerante','Terroso','Fissativo','Anti-elastasi'] },
  'glicerina': { name: 'Glicerina Naturale Vegetale', role: 'Idratante · Umettante', origine: 'Glicerol ottenuto da saponificazione di oli vegetali (oliva, cocco, palma) o per fermentazione di zuccheri. Identica alla glicerina endogena.', meccanismo: 'Umettante per eccellenza: lega molecole d\'acqua dall\'atmosfera e le trattiene nello strato corneo. Substrato per AQP3 (acquaporine cutanee). Non occlusivo.', efficacia: 'Riduzione TEWL del 11% e idratazione cornea +28% in 4 settimane (5%). Effetto comparabile all\'urea senza irritazione.', tags: ['Idratante','Umettante','Comfort','Tollerabilità'] },
  'tensioattivi-vegetali': { name: 'Tensioattivi Vegetali Delicati', role: 'Detergente · Delicato', origine: 'Derivati da cocco e zuccheri (cocoyl glutamate, coco-glucoside, decyl glucoside, sodium coceth sulfate). Biodegradabili, non eco-tossici.', meccanismo: 'Tensioattivi anionici/non-ionici a bassa CMC: detergenza efficace rispettando il film idrolipidico. PH-compatibili con la pelle (5,5-6,5).', efficacia: 'TEWL post-lavaggio +3% (vs +15% di SLS). Tollerabilità oculare e cutanea superiore ai tensioattivi sintetici tradizionali.', tags: ['Detergente','Delicato','Biodegradabile','Eco-friendly'] },
  'acqua-riso-fermentata': { name: 'Acqua di Riso Fermentata', role: 'Idratante · Illuminante', origine: 'Ottenuta dalla fermentazione del riso (Oryza sativa) tramite lieviti, tradizione cosmetica K-beauty. Ricca di aminoacidi, peptidi, vitamine B, gamma-oryzanolo.', meccanismo: 'I fermenti producono acido lattico (esfoliazione delicata + idratazione), allantoina (lenitiva), inositolo (cofattore cellulare). Aminoacidi mantengono il film idrolipidico.', efficacia: 'Luminosità cutanea +21% in 28 giorni (n=30). Tessitura uniforme, glass skin effect documentato in studi K-beauty.', tags: ['Idratante','Illuminante','K-beauty','Fermentato'] },
  'centella': { name: 'Centella Asiatica (Cica)', role: 'Lenitiva · Riparatrice', origine: 'Pianta medicinale asiatica (Centella asiatica). Triterpeni standardizzati (madecassoside, asiaticoside, acidi madecassico e asiatico).', meccanismo: 'Madecassoside attiva la sintesi di collagene I/III e fibronectina. Asiaticoside accelera la riepitalizzazione. Anti-infiammatorio via inibizione NF-κB.', efficacia: 'Eritema cutaneo -38% in 14 giorni (n=42). Riparazione barriera epidermica accelerata del 40% in studi clinici.', tags: ['Lenitiva','Cica','Riparatrice','Anti-rossori'] },
  'estratto-caffe': { name: 'Estratto di Caffè (Coffea arabica)', role: 'Drenante · Decongestionante', origine: 'Estratto idroglicerico da chicchi di Coffea arabica. Ricco di caffeina, acidi clorogenici, trigonelline, polifenoli.', meccanismo: 'Caffeina inibisce la fosfodiesterasi → vasocostrizione e lipolisi locale. Acidi clorogenici antiossidanti. Riduce gonfiore e occhiaie tramite drenaggio linfatico.', efficacia: 'Borse perioculari -22% e occhiaie -16% in 6 settimane (estratto al 3%, n=28). Microcircolazione cutanea +18%.', tags: ['Drenante','Anti-borse','Antiossidante','Microcircolatorio'] },
  'microperle-minerali': { name: 'Microperle Minerali Illuminanti', role: 'Illuminante · Correttivo', origine: 'Pigmenti minerali perlati (mica rivestita di ossidi di titanio e ferro). Sfericoidali, ad alta riflettanza ottica diffusa.', meccanismo: 'Riflettono la luce in modo diffuso e uniforme, mascherando otticamente le imperfezioni (effetto soft-focus). Non sono iridescenti ma luminescenti pearlescent.', efficacia: 'Effetto correttivo immediato sulla zona perioculare: borse e occhiaie meno visibili dalla prima applicazione (test sensoriale n=25, 89% di apprezzamento).', tags: ['Illuminante','Correttivo','Soft-focus','Minerale'] },
  'pigmenti-perlati': { name: 'Pigmenti Minerali Perlati', role: 'Luminosità · Glow', origine: 'Mica naturale rivestita con biossido di titanio (CI 77891) e ossidi di ferro. Granulometria micronizzata per finitura pearlescent delicata.', meccanismo: 'Riflettono la luce con angolo Bragg specifico, creando un effetto luminoso multicolore-bianco. Glow naturale senza glitter visibili.', efficacia: 'Luminosità cutanea percepita +34% (panel sensoriale n=30). Sicuri per pelli sensibili, niente FD&C dyes.', tags: ['Luminosità','Glow','Pearlescent','Modulabile'] },
  'pumpcoll': { name: 'Pumpcoll® (Zucca Upcycling)', role: 'Stimolante collagene · Elasticizzante', origine: 'Estratto idrolizzato da zucca (Cucurbita pepo) ottenuto da scarti di filiera (upcycling). Brevetto bioattivo italiano.', meccanismo: 'Peptidi di zucca + cucurbitine stimolano i fibroblasti dermici aumentando la sintesi di collagene I e fibronectina. Migliora l\'elasticità cutanea.', efficacia: 'Elasticità cutanea +14% in 28 giorni (cutometria, n=22). Sintesi collagene +27% in coltura di fibroblasti.', tags: ['Anti-età','Elasticità','Upcycling','Brevettato'] },
  'argireline-amplified': { name: 'Argireline Amplified® (Acetyl Hexapeptide-8)', role: 'Anti-rughe · Effetto botox-like', origine: 'Hexapeptide sintetico (Lucas Meyer Cosmetics) di seconda generazione, evoluzione dell\'Argireline classico, penetrazione cutanea +6×.', meccanismo: 'Mima il frammento N-terminale di SNAP-25, bloccando la formazione del complesso SNARE → ridotto rilascio di acetilcolina → minor contrazione muscolare mimica.', efficacia: 'Riduzione rughe d\'espressione del 30% in 28 giorni (10%, n=25). Effetto comparabile alla tossina botulinica topica.', tags: ['Anti-rughe','Botox-like','Peptide','Espressione'] },
  'capixyl': { name: 'Capixyl® (Peptide Biomimetico)', role: 'Stimolante crescita pilifera · Anti-caduta', origine: 'Complesso biomimetico Lipotec®: Acetyl Tetrapeptide-3 + estratto di Trifolium pratense (trifoglio rosso) ricco di biocanin A.', meccanismo: 'Tetrapeptide-3 stimola la sintesi delle proteine della matrice extracellulare follicolare (laminina, collagene XVII). Biocanin A inibisce la 5α-reduttasi (riduce DHT, anti-caduta).', efficacia: 'Densità ciglia/sopracciglia +46% in 56 giorni (5%, n=44). Lunghezza ciglia +24%. Riduzione caduta significativa.', tags: ['Anti-caduta','Crescita pilifera','Peptide','Follicolare'] },
  'capilia-longa': { name: 'Capilia Longa (Curcuma Longa Callus)', role: 'Anti-caduta · Rinforzante', origine: 'Cellule staminali meristematiche di Curcuma longa coltivate in vitro (Vytrus Biotech, Spagna). Contengono curcuminoidi e PIE (polifenoli).', meccanismo: 'Inibisce la transizione da fase anagen a catagen del follicolo pilifero, prolunga la fase di crescita. Riduce lo stress ossidativo del follicolo.', efficacia: 'Riduzione caduta capelli/ciglia del 89% in 150 giorni (RCT n=30). Aumento densità +52% nei soggetti con alopecia androgenetica lieve.', tags: ['Anti-caduta','Staminali','Curcuma','Rinforzante'] },
  'vite-rossa': { name: 'Cellule Meristematiche di Vite Rossa', role: 'Antiossidante · Protettivo', origine: 'Cellule staminali vegetali di Vitis vinifera (vite rossa) coltivate in vitro. Resveratrolo, antociani, viniferine.', meccanismo: 'Resveratrolo attiva sirtuina-1 (longevità cellulare). Antociani neutralizzano ROS. Viniferine inibiscono la tirosinasi (uniformità tono).', efficacia: 'Protezione da stress ossidativo +28% in cheratinociti (in vitro). Effetto anti-aging epigenetico documentato.', tags: ['Antiossidante','Anti-età','Staminali','Resveratrolo'] },
  'maxi-lip': { name: 'MAXI-LIP® (Palmitoyl Tripeptide-1)', role: 'Volumizzante labbra · Idratante', origine: 'Tripeptide biomimetico (Sederma, Francia) coniugato con acido palmitico per aumentare la penetrazione lipidica.', meccanismo: 'Stimola la sintesi di collagene e acido ialuronico nei fibroblasti delle labbra. Aumenta volume e idratazione in modo progressivo e fisiologico.', efficacia: 'Volume labbra +40% in 28 giorni (videomicroscopia, n=30). Idratazione +60%, contorno definito.', tags: ['Volumizzante','Anti-rughe','Peptide','Labbra'] },
  'olio-ricino': { name: 'Olio di Ricino (Ricinus communis)', role: 'Nutriente · Lucidante', origine: 'Spremitura a freddo dei semi di Ricinus communis. Ricco di acido ricinoleico (90%), unico nel regno vegetale.', meccanismo: 'Acido ricinoleico ha proprietà emollienti e anti-infiammatorie (inibizione PGE2). Bassa viscosità, alto potere lucidante e nutriente.', efficacia: 'Lucentezza labbra +52% (effetto gloss durevole). Idratazione 8 ore dopo applicazione singola.', tags: ['Nutriente','Lucidante','Emolliente','Lipid-barrier'] },
  'zinco-pca': { name: 'Zinco PCA (Pyrrolidone Carboxylate)', role: 'Sebo-regolatore · Purificante', origine: 'Sale di zinco con acido pirrolidonico carbossilico (NMF naturale della pelle). Forma chelata, biodisponibile.', meccanismo: 'Zinco inibisce la 5α-reduttasi tipo I (riduce DHT, riduce sebo). PCA è umettante naturale. Effetto antibatterico verso C. acnes.', efficacia: 'Sebo +37% di riduzione in 28 giorni (3%, n=35). Punti neri visibili -41% in 6 settimane. Pori dilatati visibilmente ridotti.', tags: ['Sebo-regolatore','Purificante','Pori','Anti-acne'] },
  'acido-salicilico': { name: 'Acido Salicilico (BHA)', role: 'Esfoliante · Anti-imperfezioni', origine: 'Beta-hydroxy acid (BHA) ottenuto da corteccia di salice (Salix alba) o per sintesi. Lipofilo, penetra nei pori sebacei.', meccanismo: 'Dissolve i corneociti del dotto pilosebaceo (esfoliazione intracanalicolare). Anti-infiammatorio via COX/LOX inhibition. Comedolitico.', efficacia: 'Comedoni -47% in 8 settimane (2%, n=40). Pori meno visibili, grana cutanea uniforme. Standard in dermatologia per acne lieve.', tags: ['Esfoliante','BHA','Anti-comedone','Pori'] },
  'micelle-acqua-girasole': { name: 'Olio di Girasole (Omega 3-6)', role: 'Emolliente · Struccante', origine: 'Olio vergine spremuto a freddo dai semi di Helianthus annuus (girasole). Ricco di acido linoleico (omega-6, 65%) e oleico (omega-9).', meccanismo: 'Affinità lipidica con il sebo: scioglie make-up waterproof e impurità lipofile per solubilizzazione. Riparativo della barriera cutanea.', efficacia: 'Rimozione mascara waterproof: 96% in un singolo passaggio (panel n=30). Non comedogenico (0/5).', tags: ['Struccante','Lipofilo','Omega 3-6','Non comedogenico'] },
};

// Traduzione EN della libreria attivi. Stesse chiavi di ACTIVES_LIB; i nomi propri / INCI

  'acido-ialuronico': { name: 'Hyaluronic Acid', role: 'Moisturizing · Volumizing', origine: 'Biotechnological, produced by bacterial fermentation from Streptococcus equi. Identical to endogenous hyaluronic acid.', meccanismo: 'Hygroscopic glycosaminoglycan: binds up to 1,000× its weight in water. Low MW penetrates the deeper layers, high MW forms a hydrating film on the surface.', efficacia: 'Clinical study (n=34): 27% reduction in wrinkle depth in 4 weeks. 43% increase in skin hydration.' },
  'collagene-vegetale': { name: 'Hydrolysed Plant Collagen', role: 'Firming · Plumping', origine: 'Derived from the hydrolysis of plant proteins (wheat, oat, soy). Low-MW peptides able to penetrate the skin barrier.', meccanismo: 'The collagen-like peptides stimulate the synthesis of endogenous type I and III collagen in fibroblasts. Immediate mechanical tightening effect.', efficacia: '19% reduction in skin laxity in 8 weeks (cutometry). Visible lifting effect in 30 minutes.' },
  'collagene-marino': { name: 'Hydrolysed Marine Collagen', role: 'Plumping · Restructuring', origine: 'Extracted from fish scales by enzymatic hydrolysis. MW < 5 kDa for maximum skin bioavailability.', meccanismo: 'Gly-Pro-Hyp peptides activate dermal fibroblasts, increasing the production of endogenous collagen and hyaluronic acid.', efficacia: 'Meta-analysis of 11 RCTs: 23% wrinkle reduction and 22% increase in elasticity in 12 weeks.' },
  'vitamina-c': { name: 'Vitamin C (Ascorbyl Glucoside)', role: 'Antioxidant · Brightening', origine: 'Stable form of vitamin C hydrolysed by skin α-glucosidases, releasing pure ascorbic acid into the dermis.', meccanismo: 'Competitive tyrosinase inhibitor (IC50 ~0.1 mM). Cofactor for collagen synthesis. Powerful electron donor against free radicals.', efficacia: '8% reduction in melanin index in 4 weeks (2% concentration). 33% increase in type I collagen in vitro.' },
  'vitamina-e': { name: 'Vitamin E (Tocopheryl Acetate)', role: 'Antioxidant · Nourishing', origine: 'Plant-derived tocopheryl acetate (sunflower, wheat germ). Converted by the skin into free tocopherol via esterases.', meccanismo: 'The main lipid-soluble antioxidant of the cell membrane: it interrupts lipid peroxidation by capturing the peroxyl radical (ROO•). Synergy with Vitamin C.', efficacia: '34% reduction in UV-induced erythema. 14% decrease in TEWL on dry skin in 6 weeks.' },
  'retinolo': { name: 'Retinol (Retinyl Palmitate)', role: 'Cell renewal · Anti-ageing', origine: 'Stable ester of retinol with palmitic acid. The skin releases it by hydrolysis, then oxidises it to retinoic acid (the bioactive form).', meccanismo: 'Binds to nuclear RAR/RXR receptors: upregulates procollagen I/III synthesis, downregulates MMP-1 and MMP-3. Accelerates keratinocyte turnover.', efficacia: '36% reduction in fine wrinkles in 12 weeks (n=53). 14% increase in epidermal thickness in 6 months.' },
  'peptidi': { name: 'Biomimetic Peptides', role: 'Cell stimulant · Lifting', origine: 'Synthetic (Palmitoyl Tripeptide-1, Tetrapeptide-7, Argireline®). The palmitoyl group increases lipophilicity to penetrate the corneal barrier.', meccanismo: 'Tripeptide-1 activates fibroblasts → collagen synthesis. Tetrapeptide-7 reduces IL-6 and TNF-α. Argireline mimics the N-terminal fragment of SNAP-25, reducing muscle contraction.', efficacia: 'Matrixyl 3000: 44% reduction in deep wrinkles in 2 months (n=28). Argireline: 17% reduction in expression lines in 4 weeks.' },
  'caffeina': { name: 'Caffeine', role: 'Draining · Decongestant', origine: 'Xanthine alkaloid from Coffea arabica, Camellia sinensis, Theobroma cacao.', meccanismo: 'Phosphodiesterase inhibitor: blocks cAMP breakdown → activates lipase → lipolysis of adipocytes. Vasoconstriction by adenosine antagonism → reduced puffiness.', efficacia: '1.9 cm reduction in thigh circumference in 4 weeks (3% caffeine). Under-eye bags -22% in 6 weeks.' },
  'niacinamide': { name: 'Niacinamide (Vitamin B3)', role: 'Evening · Sebum-regulating', origine: 'Amide form of vitamin B3. Stable in aqueous formulas at pH 4–7.', meccanismo: '1) Inhibits melanosome transfer → depigmenting effect. 2) Stimulates ceramide synthesis. 3) Downregulates pro-inflammatory cytokines. 4) Inhibits bacterial lipase → reduces oxidised sebum.', efficacia: '35–68% reduction in dark spots in 8 weeks (5%). Pores -16% in 4 weeks. Sebum output -24% (n=50).' },
  'aloe-vera': { name: 'Aloe Vera (Aloe Barbadensis)', role: 'Moisturizing · Soothing', origine: 'Gel from the leaves of Aloe barbadensis. Contains acemannan, amino acids, enzymes (bradykinase), anthraquinones, vitamins A/C/E.', meccanismo: 'Acemannan forms an occlusive film (reduces TEWL). Inhibits bradykinin. Galacturonan stimulates fibroblast proliferation. Antimicrobial activity.', efficacia: '32% reduction in xerosis in 2 weeks. Healing of first-degree burns accelerated by 9 days vs. sulfadiazine (Cochrane).' },
  'bisabololo': { name: 'α-Bisabolol', role: 'Anti-inflammatory · Soothing', origine: 'Monocyclic terpene extracted from chamomile (Matricaria chamomilla) or synthetic.', meccanismo: 'Inhibits COX-2, reducing pro-inflammatory prostaglandins. Fe³⁺/Cu²⁺ chelator → inhibition of •OH radicals. Increases the penetration of other actives.', efficacia: '28% reduction in SDS-induced erythema in 24h. Synergistic effect with Vitamin E: -45% lipid peroxidation in vitro.' },
  'olio-argan': { name: 'Argan Oil (Argania spinosa)', role: 'Nourishing · Antioxidant', origine: 'Cold-pressed from kernels of Moroccan organic argan. Preserves all bioactive components.', meccanismo: 'Unsaturated fatty acids (oleic 43–49%, linoleic 29–36%) repair the skin barrier. γ-Tocopherol antioxidant. Squalene and β-sitosterol anti-inflammatory.', efficacia: '26% reduction in TEWL in 4 weeks. Skin elasticity +9.5% in 60 days (menopause).' },

  'olio-monoi': { name: 'Tahitian Monoï Oil PDO', role: 'Brightening · Elasticising', origine: 'Maceration of Gardenia Tahitensis (Tiare) flowers in coconut oil. The PDO guarantees Tahitian origin (maceration ≥10 days).', meccanismo: 'Elasticising protective film on skin and hair. Floral terpenes (geraniol, linalool) with antioxidant and anti-irritant action.', efficacia: '31% reduction in TEWL and +23% hair shine compared to untreated (tribological study).' },
  'olio-mandorle': { name: 'Sweet Almond Oil (Prunus amygdalus)', role: 'Emollient · Soothing', origine: 'Cold-pressed from the seed of Prunus amygdalus dulcis. Odourless, with very high tolerability on sensitive and paediatric skin.', meccanismo: 'Oleic (64–82%) and linoleic (7–30%) acids mimic intercorneocyte lipids. Vitamin E antioxidant. β-sitosterol anti-inflammatory.', efficacia: '34% reduction in itching and 41% in xerosis in children with atopic dermatitis in 4 weeks (RCT, n=56).' },
  'ceramidi': { name: 'Plant Ceramides', role: 'Skin barrier · Anti-TEWL', origine: 'Ceramide NP and AP from wheat, rice, konjac. Structurally identical to human skin ceramides.', meccanismo: 'They incorporate into the lamellar structures of the stratum corneum, repairing barrier defects. They modulate keratinocyte differentiation by upregulating filaggrin.', efficacia: '15–30% reduction in TEWL in 4 weeks. Efficacy comparable to cholesterol in lamellar repair.' },
  'zinco-pca': { name: 'Zinc PCA (Pyrrolidone Carboxylate)', role: 'Sebum-regulating · Purifying', origine: 'Zinc salt with pyrrolidone carboxylic acid (a natural NMF of the skin). Chelated, bioavailable form.', meccanismo: 'Zinc inhibits type I 5α-reductase (reduces DHT, reduces sebum). PCA is a natural humectant. Antibacterial effect against C. acnes.', efficacia: '37% reduction in sebum in 28 days (3%, n=35). Visible blackheads -41% in 6 weeks. Visibly reduced enlarged pores.' },
  'bakuchiol': { name: 'Bakuchiol', role: 'Retinol alternative · Renewing', origine: 'Phenolic meroterpene from Psoralea corylifolia seeds. 100% plant-based, with a safety profile superior to retinol.', meccanismo: 'Activates the same genes as retinol (RAR/RXR), stimulating collagen I/III/IV, fibronectin and elastin, without retinoic-acid irritation.', efficacia: 'Comparative study (n=44, 12 wks): bakuchiol 0.5% = retinol 0.5% on wrinkles (-19.7% vs -20.1%) with significantly less irritation.' },
  'isoflavoni-soia': { name: 'Soy Isoflavones', role: 'Sebum-regulating · Phytoestrogen', origine: 'Polyphenols (genistein, daidzein) from Glycine max. Structure similar to endogenous estrogens.', meccanismo: 'They bind to cutaneous ERβ receptors → less inflammation, more barrier. Type 1 5α-reductase inhibition → reduced sebum.', efficacia: 'Wrinkles -14% in 24 weeks on perimenopausal skin. Sebum -18% in 8 weeks.' },
  'olio-baobab': { name: 'Baobab Oil (Adansonia digitata)', role: 'Regenerating · Nourishing', origine: 'Organic fair-trade, cold-pressed from African baobab seeds. A source of vitamins B2, C, calcium, iron, zinc, manganese.', meccanismo: 'Unique composition: palmitoleic, linoleic, linolenic. Penetrates quickly. Omega-3 and Omega-6 in a 1:2 ratio → reduced skin inflammation.', efficacia: 'Flaking -43%, epidermal hydration +52% in 4 weeks on very dry skin (n=30).' },
  'cellule-staminali-leontopodium': { name: 'Edelweiss Stem Cells', role: 'Anti-ageing · UV protection', origine: 'Biotechnological extract (PhytoCellTec™) from Leontopodium alpinum cultivated in vitro. It produces leontopodic acid to survive Alpine UV.', meccanismo: 'Protects epithelial stem cells from UV-induced apoptosis. Stimulates p63 (a stem marker) in keratinocytes. Reduces mitochondrial oxidative damage.', efficacia: 'Wrinkles -15% in 4 weeks (profilometry). Epidermal stem-cell viability +63% after UVB irradiation in vitro.' },
  'luminescine': { name: 'Luminescine® (Verbascum thapsus)', role: 'Brightening · Photoluminescent', origine: 'Patented Silab® extract from French organic Verbascum thapsus. COSMOS ORGANIC certified.', meccanismo: 'Photoluminescent glycoiridoids: they absorb UV and re-emit it as visible light. Inhibits tyrosinase and melanogenesis (CRTC1/MITF). Reduces melanosome transfer.', efficacia: 'Melanin index -24% in 56 days (n=25). Perceived radiance +31% in 4 weeks.' },
  'butylresorcinol': { name: '4-Butylresorcinol', role: 'Depigmenting · Anti-spot', origine: 'Synthetic resorcinol derivative, developed as a new-generation depigmenting agent.', meccanismo: 'Dual mechanism: inhibits tyrosinase (TYR) with IC50 ~0.5 µM (80× more potent than arbutin) and TYRP-1/TYRP-2, blocking melanogenesis in two steps.', efficacia: 'Hyperpigmentation spots -41% in 8 weeks (0.1%, vs. hydroquinone 4%). No rebound risk.' },
  'karite': { name: 'Shea Butter (Vitellaria paradoxa)', role: 'Nourishing · Regenerating', origine: 'Fat from Vitellaria paradoxa seeds (Sahel). Rich in unsaponifiables (7–11%) with unique biological activities.', meccanismo: 'Stearic (43–48%) + oleic (43–55%). Unsaponifiable triterpenes anti-inflammatory via 5-LOX. Stimulation of collagen synthesis. Natural ceramides.', efficacia: 'TEWL -48% in 4 weeks on chronically dry skin. Anti-inflammatory comparable to 0.5% hydrocortisone on SDS erythema.' },
  'pantenolo': { name: 'Panthenol (Pro-Vitamin B5)', role: 'Moisturizing · Soothing', origine: 'Alcohol of D-pantothenic acid. The skin converts it into pantothenic acid (B5), a cofactor of Coenzyme A.', meccanismo: 'Humectant: attracts water molecules (5 g H₂O / g). Stimulates fibroblast proliferation and fibronectin synthesis. Accelerates re-epithelialisation.', efficacia: 'TEWL -8% and xerosis -21% in 4 weeks (5%). Re-epithelialisation +42% on ex-vivo wound healing.' },
  'estratto-te-verde': { name: 'Green Tea Extract (Camellia sinensis)', role: 'Antioxidant · Anti-inflammatory', origine: 'Standardised in EGCG (epigallocatechin gallate) from unfermented leaves. EGCG = 60–65% of total catechins.', meccanismo: 'EGCG inhibits MMP-9 (which degrades collagen). Downregulates NF-κB. Absorbs UV-B (280–320 nm). Chelates Fe²⁺ and Cu²⁺.', efficacia: 'UV-B erythema -27% (EGCG 1% pre-exposure). MMP-9 -62% in irradiated keratinocytes (in vitro).' },
  'jojoba': { name: 'Jojoba Oil (Simmondsia chinensis)', role: 'Sebum-balancing · Emollient', origine: 'Liquid wax from Simmondsia chinensis seeds. 97% long-chain wax esters, a structure unique in the plant kingdom.', meccanismo: 'Structure identical to skin sebum → non-comedogenic balancing. Extremely stable to oxidation. Low viscosity with no greasy effect.', efficacia: 'Non-comedogenic (0/5 in vitro). Sebum -12% in 4 weeks. Excellent tolerability with acne (n=40).' },
  'allantoina': { name: 'Allantoin', role: 'Soothing · Keratoplastic', origine: 'From Symphytum officinale or by synthesis (oxidation of uric acid). FDA GRAS.', meccanismo: 'Keratoplastic (low conc.) / keratolytic (high conc.). Antagonises pro-inflammatory prostaglandins. Forms complexes with irritant proteins, neutralising them.', efficacia: 'Skin healing +39% vs control (allantoin 2%). SDS irritation -26% (0.5%).' },
  'bamboo': { name: 'Bamboo Extract (Bambusa vulgaris)', role: 'Strengthening · Mineral', origine: 'From the bamboo internode. Rich in plant silica (70% of dry content), flavonoids and amino acids.', meccanismo: 'Bioavailable organic silica → cofactor of prolyl hydroxylase → hydroxyproline synthesis in collagen. Stimulates fibroblast proliferation.', efficacia: 'Collagen +18% in fibroblast culture (0.5%). Wrinkles -12% in 6 weeks on male skin (n=28).' },
  'tea-tree': { name: 'Tea Tree Oil (Melaleuca alternifolia)', role: 'Antibacterial · Purifying', origine: 'Essential oil from Melaleuca alternifolia leaves. Standardised in terpinen-4-ol (>30%) per ISO 4730.', meccanismo: 'Terpinen-4-ol alters bacterial membrane permeability. Activity against C. acnes, S. aureus MRSA, Candida. Inhibits inflammatory mediators from monocytes.', efficacia: 'TTO 5% = benzoyl peroxide 5% on acne (RCT n=124, 3 months) with less irritation. Acne lesions -44%.' },
  'camomilla': { name: 'Chamomile Extract (Matricaria chamomilla)', role: 'Soothing · Anti-erythema', origine: 'From flower heads of Matricaria chamomilla. Standardised in apigenin and α-bisabolol.', meccanismo: 'Apigenin inhibits COX-2 and LOX-5 → reduction of PGE2 and leukotrienes. α-Bisabolol anti-inflammatory. Chamazulene antioxidant and antihistamine.', efficacia: 'Erythema and itching -60% vs placebo in allergic dermatitis (2%, n=20). Comparable to 0.25% hydrocortisone on mild chronic eczema.' },
  'rosa': { name: 'Rose Extract (Rosa damascena)', role: 'Antioxidant · Moisturizing', origine: 'From petals of Rosa damascena (Bulgaria, Morocco). Essential oil (citronellol, geraniol) and polyphenols (quercetin, anthocyanins).', meccanismo: 'The essential oil inhibits neutrophil elastase. Antioxidant polyphenols (ORAC ~22,000 µmol TE/g). Galloyl glucosides inhibit MMP-1/2.', efficacia: 'TEWL -11%, hydration +25% in 4 weeks (2%). Antioxidant activity 10× higher than vitamin E (DPPH).' },
  'ginkgo-biloba': { name: 'Ginkgo Biloba Extract', role: 'Antioxidant · Microcirculatory', origine: 'Leaves of Ginkgo biloba (a living fossil). Standardised in flavonoids (quercetin, kaempferol) and terpene lactones (bilobalide, ginkgolides A/B).', meccanismo: 'Free-radical scavenger (ROS). Improves skin microcirculation by inhibiting PAF (platelet-activating factor). Increases tissue oxygenation and protects the capillary endothelium.', efficacia: '35% reduction in signs of skin fatigue in 4 weeks (1%). 18% increase in microcirculation (laser-Doppler).' },
  'ginseng': { name: 'Ginseng Extract (Panax ginseng)', role: 'Toning · Revitalising', origine: 'Root of Korean Panax ginseng. Triterpene saponins (ginsenosides Rb1, Rg1, Re) with adaptogenic action.', meccanismo: 'Rg1 stimulates fibroblast proliferation and procollagen I synthesis. Rb1 protects against UV-induced apoptosis. Adaptogenic effect: it improves the skin response to stress.', efficacia: 'Skin elasticity +18% in 12 weeks (3%, n=23). 22% reduction in signs of skin fatigue.' },
  'bergamotto': { name: 'Bergamot Essential Oil (Citrus bergamia)', role: 'Toning · Refreshing', origine: 'Cold-pressed from the peel of the Citrus bergamia fruit (Calabria PDO). Limonene (37%), linalyl acetate (30%), linalool (10%).', meccanismo: 'Fresh citrus aroma with a psychophysical toning effect. Broad-spectrum antimicrobial (S. aureus, E. coli). Bergamottin and bergapten: used in a bergapten-free formula to avoid phototoxicity.', efficacia: 'Antibacterial activity MIC 0.25% on S. aureus. Refreshing effect perceived 30 sec after application.' },
  'pepe-rosa': { name: 'Pink Pepper (Schinus molle)', role: 'Stimulating · Toning', origine: 'Dried berries of Schinus molle (false pepper). Essential oil rich in α-pinene, β-pinene, limonene and sesquiterpenes.', meccanismo: 'A spicy-floral note that opens the olfactory composition. Local toning, mild vasoactive effect. Antioxidant thanks to polyphenols.', efficacia: 'Antioxidant capacity DPPH IC50 = 35 µg/mL. Perceived skin tone +15% (sensory panel).' },
  'cedro': { name: 'Cedarwood (Cedrus atlantica)', role: 'Rebalancing · Soothing', origine: 'Distillation of Cedrus atlantica wood (Moroccan Atlas). Sesquiterpenes (cedrol, atlantol, cedrenes) with warm balsamic notes.', meccanismo: 'Cedrol: mild sedative action via GABA and toning of capillary microcirculation. Antibacterial against S. aureus and P. acnes.', efficacia: 'Perceived relaxing effect (HRV +8%) within 5 minutes. Antibacterial activity MIC 0.5%.' },
  'patchouli': { name: 'Patchouli (Pogostemon cablin)', role: 'Regenerating · Sensory', origine: 'Distillation of the dried, fermented leaves of Pogostemon cablin (Indonesia). Patchoulol (35-40%), α-bulnesene, α-guaiene.', meccanismo: 'Patchoulol stimulates cell turnover and has anti-elastase activity. Recognised regenerating and healing action. Olfactory fixative in compositions.', efficacia: 'Elastase inhibition -42% (in vitro, 0.5%). Effect on epidermal cell cohesion +12%.' },
  'glicerina': { name: 'Natural Plant Glycerin', role: 'Moisturizing · Humectant', origine: 'Glycerol obtained from the saponification of vegetable oils (olive, coconut, palm) or by fermentation of sugars. Identical to endogenous glycerin.', meccanismo: 'The ultimate humectant: it binds water molecules from the atmosphere and retains them in the stratum corneum. Substrate for AQP3 (skin aquaporins). Non-occlusive.', efficacia: '11% reduction in TEWL and +28% stratum-corneum hydration in 4 weeks (5%). Effect comparable to urea without irritation.' },

  'centella': { name: 'Centella Asiatica (Cica)', role: 'Soothing · Repairing', origine: 'Asian medicinal plant (Centella asiatica). Standardised triterpenes (madecassoside, asiaticoside, madecassic and asiatic acids).', meccanismo: 'Madecassoside activates the synthesis of collagen I/III and fibronectin. Asiaticoside accelerates re-epithelialisation. Anti-inflammatory via NF-κB inhibition.', efficacia: 'Skin erythema -38% in 14 days (n=42). Epidermal barrier repair accelerated by 40% in clinical studies.' },

  'acido-salicilico': { name: 'Salicylic Acid (BHA)', role: 'Exfoliating · Anti-blemish', origine: 'Beta-hydroxy acid (BHA) obtained from willow bark (Salix alba) or by synthesis. Lipophilic, it penetrates the sebaceous pores.', meccanismo: 'Dissolves the corneocytes of the pilosebaceous duct (intracanalicular exfoliation). Anti-inflammatory via COX/LOX inhibition. Comedolytic.', efficacia: 'Comedones -47% in 8 weeks (2%, n=40). Less visible pores, even skin texture. A dermatology standard for mild acne.' },
  'micelle-acqua-girasole': { name: 'Sunflower Oil (Omega 3-6)', role: 'Emollient · Make-up removing', origine: 'Virgin oil cold-pressed from Helianthus annuus (sunflower) seeds. Rich in linoleic acid (omega-6, 65%) and oleic (omega-9).', meccanismo: 'Lipid affinity with sebum: it dissolves waterproof make-up and lipophilic impurities by solubilisation. Repairs the skin barrier.', efficacia: 'Waterproof mascara removal: 96% in a single pass (panel n=30). Non-comedogenic (0/5).' },

// Localizza un attivo della libreria per chiave: in EN usa ACTIVES_EN[key] (definito sopra)
// con fallback ai campi IT. I nomi descrittivi sono tradotti, INCI / nomi propri restano.
function actLoc(key) {
  const d = ACTIVES_LIB[key] || {};
  const en = (lang === 'en' && typeof ACTIVES_EN !== 'undefined') ? (ACTIVES_EN[key] || {}) : {};
  return {
    name:       en.name       || d.name,
    role:       en.role       || d.role,
    origine:    en.origine    || d.origine,
    meccanismo: en.meccanismo || d.meccanismo,
    efficacia:  en.efficacia  || d.efficacia,
  };
}

function findLibKey(text) {

  for (const [k, v] of Object.entries(ING_KEY_MAP)) {

// ── KEY INGREDIENTS — render lista attivi (richiamato anche al cambio lingua) ──
const kiRows = document.getElementById('kiRows');

function renderActives() {
  const T = lang === 'en'
    ? { origine: 'Origin', mecc: 'Mechanism', eff: 'Clinical evidence', active: 'Active ingredient' }
    : { origine: 'Origine', mecc: "Meccanismo d'azione", eff: 'Evidenza clinica', active: 'Ingrediente attivo' };

  const actives = loc.actives || [];
  let activesDisplay = actives.slice();
  if (product.inci) {
    const inciParts = product.inci.split(',').map(s => s.trim());
    const seen = new Set();
    inciParts.forEach(part => {
      const key = findLibKey(part);
      if (key && !seen.has(key)) {
        seen.add(key);
        const lib = ACTIVES_LIB[key];
        if (lib && !activesDisplay.some(a => a.startsWith(lib.name))) {
          activesDisplay.push(lib.name + ' — ' + actLoc(key).role);
        }
      }
    });
    if (activesDisplay.length === 0) {
      const skipWords = ['aqua','water','parfum','fragrance','phenoxyethanol','ethylhexylglycerin',
                         'sodium hydroxide','citric acid','benzyl','linalool','limonene',
                         'sodium benzoate','potassium sorbate','dehydroacetic acid'];
      inciParts
        .filter(s => s.length > 4 && !skipWords.some(w => s.toLowerCase().startsWith(w)))
        .slice(0, 7)
        .forEach(ing => activesDisplay.push(ing + ' — ' + T.active));
    }
  }

  kiRows.innerHTML = '';
  activesDisplay.forEach((active, i) => {
    const sep     = active.indexOf('—');
    const rawName = sep > -1 ? active.slice(0, sep).trim() : active;
    const shortDesc = sep > -1 ? active.slice(sep + 1).trim() : '';
    const key  = findLibKey(rawName);
    const data = key ? actLoc(key) : null;

    const row = document.createElement('div');
    row.className = 'ki-row' + (data ? '' : ' ki-row--no-data');
    row.setAttribute('data-reveal', '');
    row.classList.add('is-visible');
    row.style.setProperty('--d', Math.min(i, 5) * 60 + 'ms');

    row.innerHTML = `
      <div class="ki-row__head">
        <div class="ki-row__num">${String(i + 1).padStart(2, '0')}</div>
        <div class="ki-row__main">
          <div class="ki-row__name">${data ? data.name : rawName}</div>
          <div class="ki-row__tag">${data ? data.role : (shortDesc || T.active)}</div>
        </div>
        <div class="ki-row__toggle">${data ? '+' : '—'}</div>
      </div>
      ${data ? `
      <div class="ki-row__body">
        <div class="ki-detail">
          <div class="ki-detail__block">
            <div class="ki-detail__label">${T.origine}</div>
            <div class="ki-detail__text">${data.origine}</div>
          </div>
          <div class="ki-detail__block">
            <div class="ki-detail__label">${T.mecc}</div>
            <div class="ki-detail__text">${data.meccanismo}</div>
          </div>
          <div class="ki-detail__block">
            <div class="ki-detail__label">${T.eff}</div>
            <div class="ki-detail__text">${data.efficacia}</div>
          </div>
        </div>
      </div>` : ''}
    `;

    if (key) {
      row.addEventListener('click', () => openKiModal(key, i + 1));
    }
    kiRows.appendChild(row);
  });
}

// ── MODALE INGREDIENTE ────────────────────────────────────────
function openKiModal(key, num) {
  const modal = document.getElementById('kiModal');
  if (!modal) return;
  const data = actLoc(key);
  document.getElementById('kiModalNum').textContent = String(num).padStart(2, '0');
  document.getElementById('kiModalName').textContent = data.name || '';
  document.getElementById('kiModalRole').textContent = data.role || '';
  document.getElementById('kiModalOrigine').textContent = data.origine || '';
  document.getElementById('kiModalMeccanismo').textContent = data.meccanismo || '';
  document.getElementById('kiModalEfficacia').textContent = data.efficacia || '';
  // Blocca lo scroll di sfondo senza spostare la pagina (niente rewind alla chiusura)
  if (window.lenis && typeof window.lenis.stop === 'function') window.lenis.stop();
  document.body.classList.add('ki-modal-open');
  // Reset scroll della modale
  modal.scrollTop = 0;
  modal.classList.add('show');
}
function closeKiModal() {
  const modal = document.getElementById('kiModal');
  if (!modal) return;
  modal.classList.remove('show');
  document.body.classList.remove('ki-modal-open');
  // Riprendi Lenis nella stessa posizione (niente rewind)
  if (window.lenis && typeof window.lenis.start === 'function') window.lenis.start();
}
const kiModal = document.getElementById('kiModal');
if (kiModal) {
  document.getElementById('kiModalClose').addEventListener('click', closeKiModal);
  kiModal.addEventListener('click', (e) => { if (e.target === kiModal) closeKiModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeKiModal(); });
}

      actives: '<strong>Capixyl®</strong> · Cellule Meristematiche Vite Rossa · Cellule Staminali Curcuma'
    },
  };
  siblings.slice(0, 4).forEach((sib, i) => {
    const sloc   = sib[lang] || sib.it;
    const sibPal = palettes[sib.line || sib.brand] || { bg: '#1a1a1a' };
    const sibBg  = `linear-gradient(145deg, ${sibPal.bg} 0%, #050505 100%)`;
    const sibLine = window.LINES && LINES.find(l => l.id === (sib.line || sib.brand));
    const sibSvg = typeof productMock === 'function' ? productMock(sib.line || sib.brand || 'argan', sloc.name, '') : '';
    const sibBrand = sib.brand || sib.line || '';
    const ctaText = lang === 'en' ? 'Discover product &rarr;' : 'Scopri il prodotto &rarr;';
    /* Per Everby usa i testi copiati 1:1 da linee/everby.html; per gli altri estrai da data */
    let cat, name, sub, actives;
    const evCopy = sibBrand === 'everby' ? EVERBY_COPY[sib.id] : null;
    if (evCopy) {
      cat = evCopy.cat; name = evCopy.name; sub = evCopy.sub; actives = evCopy.actives;
    } else {
      cat = sibLine ? sibLine.shortName : '';
      name = sloc.name;
      sub = (lang === 'en')
        ? firstSent(sloc.sub || sloc.desc)
        : (DESC_SHORT[sib.id] || firstSent(sloc.desc || sloc.sub));
      actives = (sloc.actives || []).slice(0,3).map(a => a.split('—')[0].split('(')[0].trim()).join(' · ');
    }
    /* Visual: foto packaging per-prodotto (Everby incluso); fallback al mock SVG */
    let visualHtml;
    if (sib.images && sib.images.hero) {
      visualHtml = `<div class="pr-card__visual" style="background:${sibBg}"><img src="${sib.images.hero}?v=2" alt="${name}" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:${CARD_OBJ_POS[sib.id] || 'center'}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend',this.dataset.fallback)" data-fallback='${sibSvg.replace(/'/g, "&#39;")}'></div>`;
    } else {
      visualHtml = `<div class="pr-card__visual" style="background:${sibBg}">${sibSvg}</div>`;
    }
    relatedGrid.insertAdjacentHTML('beforeend', `
      <a class="pr-card is-visible" data-brand="${sibBrand}" href="prodotto.html?id=${sib.id}" data-reveal style="--d:${i * 80}ms">
        ${visualHtml}
        <div class="pr-card__info">
          <div class="pr-card__cat">${cat}</div>
          <div class="pr-card__name">${name}</div>
          <div class="pr-card__sub">${sub}</div>
          ${actives ? `<div class="pr-card__actives">${actives}</div>` : ''}
          <span class="pr-card__cta">${ctaText}</span>
        </div>
      </a>`);
  });
}

// ── RENDER LOCALIZZATO — testo lang-dipendente, ri-eseguito al cambio lingua ──
function renderLocalized() {
  lang = document.documentElement.lang === 'en' ? 'en' : 'it';
  loc  = product[lang] || product.it;

  // Hero: nome + claim + descrizione (con bold attivi)
  document.getElementById('pdName').textContent = loc.name;
  const subRaw = loc.sub || '';
  const subShort = subRaw.split(/\.(?:\s|$)/)[0].trim().replace(/\.?$/, '.');
  document.getElementById('pdSub').textContent = subShort;
  const descRaw = loc.desc || '';
  const descSents = descRaw.split(/\.(?:\s|$)/).map(s => s.trim()).filter(s => s.length > 3);
  const descEl = document.getElementById('pdDesc');
  descEl.textContent = descSents.slice(0, 2).join('. ').replace(/\.?$/, '.');
  const kws = Object.keys(ING_KEY_MAP).filter(k => k.length > 5).sort((a,b) => b.length - a.length);
  let dhtml = descEl.textContent.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  kws.forEach(kw => { dhtml = dhtml.replace(new RegExp('(' + kw.replace(/[-]/g,'[-]') + ')', 'gi'), '<strong>$1</strong>'); });
  descEl.innerHTML = dhtml;

  // Specs (Formato/Codice)
  const specsEl = document.getElementById('pdSpecs');
  if (specsEl) {
    specsEl.innerHTML = '';
    [ product.size ? { l: lang === 'it' ? 'Formato' : 'Size', v: product.size } : null,
      product.code ? { l: lang === 'it' ? 'Codice' : 'SKU', v: product.code } : null,
    ].filter(Boolean).forEach(m => {
      specsEl.insertAdjacentHTML('beforeend',
        `<div><div class="pd-spec__label">${m.l}</div><div class="pd-spec__val">${m.v}</div></div>`);
    });
  }

  // INCI (testo lang-dipendente solo nel fallback)
  const inciEl = document.getElementById('pdInci');
  if (inciEl) inciEl.textContent = product.inci || (lang === 'it' ? 'INCI non disponibile.' : 'INCI not available.');

  renderFormula();
  renderActives();
  renderRelated();

  document.title = `${loc.name} · Athena's`;
}
renderLocalized();
document.addEventListener('lang-change', renderLocalized);

// ── SCROLL REVEAL ─────────────────────────────────────────────
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('is-visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08 });
document.querySelectorAll('[data-reveal]').forEach(el => revealObs.observe(el));
} /* end initProductPage() */
</script>
</body>
