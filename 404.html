<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title data-it="Pagina non trovata · Athena's" data-en="Page not found · Athena's">Pagina non trovata · Athena's</title>
<meta name="description" content="La pagina che cerchi non esiste o è stata spostata."/>
<meta name="robots" content="noindex, follow"/>
<link rel="preload" href="assets/fonts/fraunces-200-normal-latin.woff2" as="font" type="font/woff2" crossorigin/>
<link rel="stylesheet" href="assets/fonts.css"/>
<link rel="stylesheet" href="assets/tokens.css"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px clamp(20px, 4vw, 60px);
    overflow-x: hidden;
  }
  .not-found {
    max-width: 760px;
    width: 100%;
    text-align: center;
  }
  .nf-code {
    font-family: var(--display);
    font-style: italic;
    font-size: clamp(140px, 22vw, 280px);
    font-weight: 200;
    color: var(--gold);
    line-height: .9;
    letter-spacing: -0.04em;
    margin-bottom: clamp(8px, 1vw, 20px);
  }
  .nf-eyebrow {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: .55;
    margin-bottom: 14px;
  }
  .nf-title {
    font-family: var(--display);
    font-size: clamp(32px, 4.5vw, 56px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  .nf-title em { font-style: italic; color: var(--sage-deep); }
  .nf-lead {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(16px, 1.4vw, 19px);
    color: rgba(26,26,26,.65);
    line-height: 1.6;
    max-width: 50ch;
    margin: 0 auto clamp(28px, 4vw, 48px);
  }
  .nf-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
  }
  .nf-btn {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 14px 26px;
    text-decoration: none;
    transition: .3s var(--ease);
  }
  .nf-btn--primary {
    background: var(--ink);
    color: var(--cream);
  }
  .nf-btn--primary:hover { background: var(--forest); }
  .nf-btn--ghost {
    border: 1px solid rgba(26,26,26,.25);
    color: var(--ink);
  }
  .nf-btn--ghost:hover { border-color: var(--ink); }
</style>
</head>
<body>
  <main class="not-found">
    <div class="nf-code">404</div>
    <div class="nf-eyebrow" data-it="Pagina non trovata" data-en="Page not found">Pagina non trovata</div>
    <h1 class="nf-title" data-it="Qualcosa è andato <em>storto</em>" data-en="Something went <em>wrong</em>">
      Qualcosa è andato <em>storto</em>
    </h1>
    <p class="nf-lead" data-it="La pagina che cerchi non esiste, è stata spostata o l'indirizzo è errato. Puoi tornare alla home o esplorare i nostri brand." data-en="The page you are looking for does not exist, has been moved or the address is incorrect. You can return to the home page or explore our brands.">
      La pagina che cerchi non esiste, è stata spostata o l'indirizzo è errato. Puoi tornare alla home o esplorare i nostri brand.
    </p>
    <div class="nf-actions">
      <a href="/" class="nf-btn nf-btn--primary" data-it="Torna alla home" data-en="Back to home">Torna alla home</a>
      <a href="/linee.html" class="nf-btn nf-btn--ghost" data-it="Scopri i brand" data-en="Discover our brands">Scopri i brand</a>
    </div>
  </main>
</body>
</html>
