/* ── HERO ───────────────────────────────────────────────── */
.prv-hero {
  min-height: 52svh;
  background: var(--cream);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.prv-hero__mark {
  position: absolute;
  right: -0.03em;
  bottom: -0.14em;
  font-family: var(--display);
  font-size: clamp(120px, 20vw, 340px);
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  opacity: .035;
  line-height: 1;
  pointer-events: none;
  white-space: nowrap;
}

.prv-hero__lines {
  position: absolute;
  top: 0; right: 0;
  width: 38%;
  height: 100%;
  overflow: hidden;
}
@media (max-width: 860px) { .prv-hero__lines { display: none; } }
.prv-hero__lines::before,
.prv-hero__lines::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(0,0,0,.06);
}
.prv-hero__lines::before { left: 22%; }
.prv-hero__lines::after  { left: 55%; }

.prv-hero__content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 0 clamp(24px, 5vw, 80px) clamp(44px, 6vw, 72px);
}

.prv-hero__label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .22em;
  text-transform: uppercase;
  opacity: .38;
  margin-bottom: 18px;
}

.prv-hero h1 {
  font-family: var(--display);
  font-weight: 300;
  font-size: clamp(56px, 10vw, 160px);
  letter-spacing: -0.03em;
  line-height: .9;
  color: var(--ink);
  margin-bottom: clamp(18px, 2.5vw, 32px);
}
.prv-hero h1 em { font-style: italic; color: var(--sage-deep); }

.prv-hero__sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(14px, 1.3vw, 18px);
  opacity: .5;
  max-width: 58ch;
  line-height: 1.65;
}

/* ── BODY ───────────────────────────────────────────────── */
.prv-body {
  max-width: 800px;
  margin: 0 auto;
  padding: clamp(48px, 7vw, 96px) clamp(24px, 6vw, 48px);
  color: var(--ink);
}

.prv-section {
  margin-bottom: clamp(40px, 5vw, 64px);
}

.prv-section h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(16px, 1.6vw, 20px);
  letter-spacing: .06em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(0,0,0,.1);
  padding-bottom: 10px;
  margin-bottom: 20px;
  color: var(--ink);
}

.prv-section h3 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(14px, 1.3vw, 17px);
  margin: 24px 0 10px;
  color: var(--ink);
  opacity: .75;
}

.prv-section p {
  font-family: var(--sans);
  font-size: clamp(13px, 1.1vw, 15px);
  line-height: 1.85;
  opacity: .65;
  margin-bottom: 14px;
}

.prv-section ul {
  margin: 10px 0 16px 20px;
  font-family: var(--sans);
  font-size: clamp(13px, 1.1vw, 15px);
  line-height: 1.85;
  opacity: .65;
}

.prv-section ul li { margin-bottom: 6px; }

.prv-section strong {
  font-weight: 500;
  opacity: 1;
  color: var(--ink);
}

.prv-section a {
  color: var(--gold-deep);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.prv-note {
  background: rgba(0,0,0,.03);
  border-left: 3px solid var(--gold);
  padding: 16px 20px;
  margin: 20px 0;
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.8;
  opacity: .75;
}

.iub-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: clamp(48px, 7vw, 96px) clamp(24px, 6vw, 48px);
}
